env:
  horizon: 200

cyber:
  backend: cyborg
  steps: 200
  agent_name: blue_agent_0
  environment: sim

social:
  # Keep social model modest for transfer, but long enough to see dynamics
  n_agents: 1200
  n_communities: 12
  bots_frac: 0.06
  base_post_misinfo: 0.050
  base_post_correction: 0.020
  susceptibility: 0.16
  correction_efficacy: 0.18
  official_efficacy: 0.26
  platforms:
    - name: microblog
      mean_degree: 18
      homophily: 0.64
      mod_remove_prob: 0.10
      mod_label_prob: 0.15
      amplification: 1.15
    - name: messaging
      mean_degree: 12
      homophily: 0.76
      mod_remove_prob: 0.05
      mod_label_prob: 0.08
      amplification: 0.95
    - name: video
      mean_degree: 9
      homophily: 0.60
      mod_remove_prob: 0.12
      mod_label_prob: 0.20
      amplification: 1.05

coupling:
  cyber_to_social_scale: 1.0
  social_to_cyber_scale: 1.0

protocol:
  cooldown_steps: 3
  evidence_required_for_debunk: true
  evidence_detection_threshold: 0.60
  uncertainty_label_threshold: 0.55
  require_uncertainty_label_for_debunk_when_high: true
  severity_gate_threshold: 0.75
